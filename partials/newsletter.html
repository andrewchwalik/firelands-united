<section class="newsletter-section newsletter-section--shared">
  <div class="newsletter-container">
    <h2 class="newsletter-title">Stay in the loop</h2>
    <p class="newsletter-subtitle">Get the latest news, match updates, and club announcements delivered to your inbox.</p>
    <form class="newsletter-form" id="newsletter-form">
      <input type="email" id="newsletter-email" placeholder="Your email" required>
      <button type="submit" class="newsletter-btn">Subscribe</button>
    </form>
    <p class="newsletter-disclaimer">No spam. Unsubscribe anytime.</p>
  </div>
</section>
